<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <title>Bug Hunt — Code Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/games.css" />
    <link rel="stylesheet" href="../css/animations.css" />
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="page-shell game-layout">
      <header class="game-header">
        <div>
          <a href="../index.html" class="btn btn-ghost btn-sm">← Hub</a>
          <h1>Bug Hunt</h1>
          <p>Click en la línea con el bug. Snippets simplificados de tus proyectos reales.</p>
        </div>
        <div class="game-meta">
          <span class="badge-pill">Mundo 2</span>
        </div>
      </header>
      <p id="bug-progress" style="color:var(--muted);margin-bottom:8px"></p>
      <h2 id="bug-title" style="margin-bottom:16px"></h2>
      <div id="bug-snippet" class="bug-snippet glass"></div>
      <div id="bug-hints" style="margin:16px 0"></div>
      <div id="bug-feedback"></div>
    </div>
    <script type="module" src="../js/background.js"></script>
    <script type="module" src="../js/games/bug-hunt.js"></script>
  </body>
</html>
