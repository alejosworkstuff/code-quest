<!DOCTYPE html>
<html lang="en" data-game-id="pipeline-puzzle">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <title>Pipeline Puzzle — Code Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/games.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/hub.css" />
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="page-shell game-layout">
      <header class="game-header">
        <div>
          <a href="../index.html" class="btn btn-ghost btn-sm" data-i18n="nav.hub">← Hub</a>
          <h1 data-i18n="games.pipeline-puzzle.title">Pipeline Puzzle</h1>
          <p data-i18n="games.pipeline-puzzle.subtitle">Order the ia-stories RAG flow: chunk → embed → retrieve → generate.</p>
        </div>
        <div class="game-meta">
          <span class="badge-pill" data-i18n="games.pipeline-puzzle.world">World 6</span>
          <span class="badge-pill">ia-stories</span>
        </div>
      </header>
      <div id="level-tabs" class="level-tabs"></div>
      <div class="pipeline-board glass" id="pipeline-board">
        <h3 style="margin-bottom:8px" data-i18n="pipeline.yourPipeline">Your pipeline</h3>
        <div id="pipeline-slots" class="pipeline-slots"></div>
        <h3 style="margin:16px 0 8px" data-i18n="pipeline.availableSteps">Available steps</h3>
        <div id="pipeline-pool" class="pipeline-pool"></div>
      </div>
      <div id="pipeline-feedback" style="margin-top:16px"></div>
    </div>
    <script type="module" src="../js/i18n.js"></script>
    <script type="module" src="../js/settings.js"></script>
    <script type="module" src="../js/background.js"></script>
    <script type="module" src="../js/games/pipeline-puzzle.js"></script>
  </body>
</html>
