<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <title>Decision Dungeon — Code Quest</title>
